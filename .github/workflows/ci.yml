name: DevOps CI

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  validate:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Validate Dockerfile
        run: docker build -t test-nginx ./docker/nginx

      - name: Validate Inventory
        run: ansible-inventory -i ansible/inventory.ini --list

      - name: Validate Playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/deploy.yml --syntax-check

      - name: Validate Jenkinsfile
        run: test -f Jenkinsfile
